services:
  ollama:
    image: ollama/ollama:0.22.0
    container_name: ollama
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s


  llamacpp-qwen3.6:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp-qwen3.6
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      -ngl 99
      -ot \.ffn_.*_exps\.=CPU
      -c 16384
      -fa on
      -ctk q8_0 -ctv q8_0
      --host 0.0.0.0 --port 8080
      -t 14 --no-mmap
      --temp 0.6
      --top-k 20
      --top-p 0.95
      --presence-penalty 0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s


  llamacpp-gemma4:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp-gemma4
    restart: unless-stopped
    ports:
      - "8091:8080"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -m /models/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
      -ngl 99
      -ot \.ffn_.*_exps\.=CPU
      -c 16384
      -fa on
      -ctk q8_0 -ctv q8_0
      --host 0.0.0.0 --port 8080
      -t 14 --no-mmap
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s


  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8081:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URLS=http://llamacpp-qwen3.6:8080/v1;http://llamacpp-gemma4:8080/v1
      - OPENAI_API_KEYS=sk-noauth;sk-noauth
    depends_on:
      ollama:
        condition: service_healthy
      llamacpp-qwen3.6:
        condition: service_healthy
      llamacpp-gemma4:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - open-webui
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ollama_data:
  open_webui_data:
  caddy_data:
  caddy_config:
